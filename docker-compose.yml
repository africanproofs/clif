# clif deployment. `clif-epoch` is the always-on epoch-anchored signâ†’claim
# daemon (replaces the former `clif-auto` + `clif-fsp-auto` 15-min pollers);
# `clif` (profile: cli) is the one-shot used for the rehearsal ladder + manual ops.
#
# Networking: clif reaches fwd at FWD_ENDPOINT (default http://fwd:8080), which
# requires sharing fwd's Docker network. fwd's compose network is project-
# prefixed (typically `fwd_fwd-callers`); override via FWD_NETWORK in .env if
# different. If clif runs on another host, set FWD_ENDPOINT to a reachable URL
# and replace the external network with a normal bridge.
#
# Multichain (profile: multichain) â€” replaces the upstream `~/opt/signing-tool`
# hot-key signer. clif drives ONE shared fwd for Flare (14) âˆ¥ Songbird (19) âˆ¥
# Coston2 (114) in parallel: per network, ONE epoch daemon (`epoch run`) that
# sequences uptime(optional)â†’reward-signâ†’claim per reward epoch, each with its
# own gitignored `.env.<network>` and its own `CLIF_STATE_DIR`. Notes:
#  - Per-network `CLIF_STATE_DIR` (e.g. `.clif-state/flare`) is REQUIRED in
#    each `.env.<network>` (clean per-network status/logs/backups).
#  - Every process MUST boot keyless: no `*PRIVATE_KEY*` in env or the
#    resolved `.env.<network>` (config.assert_keyless). clif holds no keys.
#  - The daemon SIGNS, so it stays hard-disabled unless `FSP_AUTO_ENABLED=true`
#    in that network's env file (D15). The UPTIME phase is additionally gated by
#    `UPTIME_AUTO_ENABLED` (default false). Per-network fwd caller tokens are
#    operator-injected secrets (Core #12) â€” only in the gitignored
#    `.env.<network>`, never in this file.
# Run a single network's daemon, e.g.:
#   docker compose --profile multichain up -d clif-epoch-flare
# or all three networks:
#   docker compose --profile multichain up -d

services:
  clif-epoch:
    build: .
    image: clif:dev
    container_name: clif-epoch
    command: ["epoch", "run"]
    env_file: [.env]
    networks: [fwd-net, egress]
    restart: unless-stopped
    healthcheck:
      # `clif epoch status` exits non-zero when degraded or when the daemon is
      # dead/stale â€” the scrapable money-path health signal.
      test: ["CMD", "clif", "epoch", "status"]
      interval: 300s
      timeout: 15s
      retries: 3
      start_period: 1200s

  clif:
    build: .
    image: clif:dev
    profiles: ["cli"]
    env_file: [.env]
    networks: [fwd-net, egress]
    entrypoint: ["clif"]
    # one-shot, e.g.:  docker compose run --rm clif claim --type fee
    # rehearsal:        docker compose run --rm clif claim --type fee --epoch <N>

  # --- Multichain (Flare âˆ¥ Songbird âˆ¥ Coston2), one shared fwd ---
  # Each service: own gitignored .env.<network> (NETWORK, CLIF_STATE_DIR,
  # FWD_ENDPOINT, the per-network FSP_*_CALLER_TOKEN + claim token secrets,
  # the per-network FSP_SIGNING_WALLET_NAME / FSP_SENDER_WALLET_NAME).

  clif-epoch-coston2:
    build: .
    image: clif:dev
    container_name: clif-epoch-coston2
    command: ["epoch", "run"]
    env_file: [.env.coston2]
    networks: [fwd-net, egress]
    profiles: ["multichain"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clif", "epoch", "status"]
      interval: 300s
      timeout: 15s
      retries: 3
      start_period: 1200s

  clif-epoch-songbird:
    build: .
    image: clif:dev
    container_name: clif-epoch-songbird
    command: ["epoch", "run"]
    env_file: [.env.songbird]
    networks: [fwd-net, egress]
    profiles: ["multichain"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clif", "epoch", "status"]
      interval: 300s
      timeout: 15s
      retries: 3
      start_period: 1200s

  clif-epoch-flare:
    build: .
    image: clif:dev
    container_name: clif-epoch-flare
    command: ["epoch", "run"]
    env_file: [.env.flare]
    networks: [fwd-net, egress]
    profiles: ["multichain"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clif", "epoch", "status"]
      interval: 300s
      timeout: 15s
      retries: 3
      start_period: 1200s

networks:
  fwd-net:
    external: true
    name: ${FWD_NETWORK:-fwd_fwd-callers}
  # Dual-homing (zero-egress fwd, v1.1.0a11+): fwd-net is `internal: true` (no
  # internet route), so clif ALSO attaches to this normal bridge for its own RPC
  # egress + broadcast + reward-distribution-data fetch. fwd is NOT on `egress`.
  egress:
    driver: bridge
